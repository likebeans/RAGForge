name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy type-check
        run: uv run mypy app sdk
      - name: Unit tests (security/audit)
        run: uv run pytest -m "not e2e"

  check-env:
    runs-on: ubuntu-latest
    outputs:
      run_openai: ${{ steps.check.outputs.run_openai }}
      run_es: ${{ steps.check.outputs.run_es }}
    steps:
      - id: check
        env:
          RUN_OPENAI_E2E: ${{ secrets.RUN_OPENAI_E2E }}
          RUN_ES_E2E: ${{ secrets.RUN_ES_E2E }}
        run: |
          if [ "$RUN_OPENAI_E2E" = "1" ]; then
            echo "run_openai=true" >> $GITHUB_OUTPUT
          else
            echo "run_openai=false" >> $GITHUB_OUTPUT
          fi
          if [ "$RUN_ES_E2E" = "1" ]; then
            echo "run_es=true" >> $GITHUB_OUTPUT
          else
            echo "run_es=false" >> $GITHUB_OUTPUT
          fi

  e2e:
    needs: check-env
    if: ${{ needs.check-env.outputs.run_openai == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run e2e OpenAI/RAG tests (requires API_BASE/API_KEY/Kb)
        env:
          API_BASE: ${{ secrets.API_BASE }}
          API_KEY: ${{ secrets.API_KEY }}
          KB_ID: ${{ secrets.KB_ID }}
        run: uv run pytest -m "e2e" tests/test_e2e_openai.py tests/test_e2e_health.py

  es-e2e:
    needs: check-env
    if: ${{ needs.check-env.outputs.run_es == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run ES/OpenSearch e2e tests
        env:
          ES_HOSTS: ${{ secrets.ES_HOSTS }}
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
        run: uv run pytest -m "e2e" tests/test_opensearch_e2e.py
