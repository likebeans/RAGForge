services:
  db:
    image: pgvector/pgvector:pg15
    container_name: rag_kb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb
      POSTGRES_DB: kb
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag_kb_redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: rag_kb_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: rag_kb_opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9201:9200"   # REST API
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: rag_kb_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://kb:kb@db:5432/kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VECTOR_STORE: ${VECTOR_STORE:-postgresql}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_API_BASE: ${SILICONFLOW_API_BASE:-https://api.siliconflow.cn/v1}
      # MinIO/OSS 配置
      OSS_ENABLED: ${OSS_ENABLED:-true}
      OSS_PROVIDER: ${OSS_PROVIDER:-minio}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-http://minio:9000}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-minioadmin}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-minioadmin}
      OSS_BUCKET: ${OSS_BUCKET:-ragforge}
      # 清除代理，避免影响容器间通信
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
    # 允许容器访问宿主机服务（Ollama）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 使用 Dockerfile 中的启动脚本（含健康检查预热）
    ports:
      - "8020:8020"
    depends_on:
      - db
      - redis
      - minio
      - opensearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8020}
    container_name: rag_kb_frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8020}
    ports:
      - "3003:3000"
    depends_on:
      - api

volumes:
  pgdata:
    name: ragforge_pgdata_shared  # 固定名称，防止切换 compose 文件丢数据
  redis_data:
    name: ragforge_redis_shared   # 固定名称
  minio_data:
    name: ragforge_minio_shared   # MinIO 数据持久化
  opensearch_data:
    name: ragforge_opensearch_shared  # OpenSearch 数据持久化